version: 2
updates:
  # open-pull-requests-limit: 0 disables routine version-bump PRs.
  # Dependabot security updates (enabled in repo Settings → Security) fire
  # independently of this schedule whenever a CVE is published for a dep.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
